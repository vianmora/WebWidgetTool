name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check last Docker Hub push date
        id: check
        run: |
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          REPO="web-widget-tool"

          RESPONSE=$(curl -s "https://hub.docker.com/v2/repositories/${USERNAME}/${REPO}/tags/latest")
          LAST_UPDATED=$(echo "$RESPONSE" | jq -r '.last_updated // empty')

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger, skipping date check"
            echo "should_push=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$LAST_UPDATED" ]; then
            echo "No existing image, will push"
            echo "should_push=true" >> $GITHUB_OUTPUT
          else
            LAST_TS=$(date -d "$LAST_UPDATED" +%s)
            NOW=$(date +%s)
            DIFF=$(( NOW - LAST_TS ))
            echo "Last push: $LAST_UPDATED (${DIFF}s ago)"
            if [ "$DIFF" -ge 86400 ]; then
              echo "More than 1 day ago, will push"
              echo "should_push=true" >> $GITHUB_OUTPUT
            else
              echo "Less than 1 day ago, skipping"
              echo "should_push=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Checkout
        if: steps.check.outputs.should_push == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.check.outputs.should_push == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.should_push == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/web-widget-tool:latest
