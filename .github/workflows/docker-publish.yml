name: Docker Build & Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*'
  workflow_dispatch:

jobs:
  check-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push needed
        id: check
        run: |
          # Tag pushes and manual triggers always push
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || \
             [ "${{ github.ref_type }}" = "tag" ]; then
            echo "Manual trigger or tag push, always pushing"
            echo "should_push=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Branch pushes: skip if latest was pushed less than 24h ago
          USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"
          REPO="web-widget-tool"

          RESPONSE=$(curl -s "https://hub.docker.com/v2/repositories/${USERNAME}/${REPO}/tags/latest")
          LAST_UPDATED=$(echo "$RESPONSE" | jq -r '.last_updated // empty')

          if [ -z "$LAST_UPDATED" ]; then
            echo "No existing image, will push"
            echo "should_push=true" >> $GITHUB_OUTPUT
          else
            LAST_TS=$(date -d "$LAST_UPDATED" +%s)
            NOW=$(date +%s)
            DIFF=$(( NOW - LAST_TS ))
            echo "Last push: $LAST_UPDATED (${DIFF}s ago)"
            if [ "$DIFF" -ge 86400 ]; then
              echo "More than 1 day ago, will push"
              echo "should_push=true" >> $GITHUB_OUTPUT
            else
              echo "Less than 1 day ago, skipping"
              echo "should_push=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Checkout
        if: steps.check.outputs.should_push == 'true'
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: steps.check.outputs.should_push == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.should_push == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.should_push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute Docker tags
        id: tags
        if: steps.check.outputs.should_push == 'true'
        run: |
          BASE="${{ secrets.DOCKERHUB_USERNAME }}/web-widget-tool"
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tags=${BASE}:${{ github.ref_name }},${BASE}:latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${BASE}:latest" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        if: steps.check.outputs.should_push == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.tags.outputs.tags }}
