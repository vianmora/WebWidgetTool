name: web-widget-tool

# =============================================================================
# Developpement — hot-reload sans rebuild
#
# Le code source est monte en volume. Les modifications sont appliquees
# instantanement (ts-node-dev pour le backend, Vite pour le frontend).
#
# Usage:
#   docker compose -f docker/compose.dev.yml up -d
#
# Backend  : http://localhost:4000
# Frontend : http://localhost:5173
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: widgets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-alpine
    working_dir: /app
    command: >
      sh -c "apk add --no-cache openssl &&
             npm install &&
             npx prisma generate &&
             npx prisma migrate deploy &&
             npm run dev"
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/widgets
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    volumes:
      - ../apps/backend:/app
      - backend_modules:/app/node_modules
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:4000}
      VITE_APP_MODE: ${VITE_APP_MODE:-selfhosted}
    volumes:
      - ../apps/frontend:/app
      - frontend_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  backend_modules:
  frontend_modules:
