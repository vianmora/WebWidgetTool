# =============================================================================
# Coolify deployment — images pré-buildées depuis Docker Hub
#
# Utilise les images publiées par le workflow CI (docker-publish.yml).
# Aucun build local requis.
#
# How to deploy on Coolify:
#   1. Create a new "Docker Compose" resource in Coolify.
#   2. Point it to this file (docker/compose.coolify.hub.yml).
#   3. Set the environment variables listed below in the Coolify UI.
#   4. Coolify will automatically assign a domain to the `frontend` service
#      and inject SERVICE_FQDN_FRONTEND_80 into the environment.
#
# Note: VITE_API_URL est baked dans l'image frontend au moment du build CI.
# Elle doit correspondre à l'URL publique de votre backend.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       widgets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: vianmora/web-widget-tool-backend:latest
    # No `ports` here — Coolify handles ingress and TLS termination.
    expose:
      - "4000"
    environment:
      DATABASE_URL:             postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/widgets
      ADMIN_EMAIL:              ${ADMIN_EMAIL}
      ADMIN_PASSWORD:           ${ADMIN_PASSWORD}
      JWT_SECRET:               ${JWT_SECRET}
      GOOGLE_MAPS_API_KEY:      ${GOOGLE_MAPS_API_KEY}
      GOOGLE_REVIEWS_CACHE_TTL: ${GOOGLE_REVIEWS_CACHE_TTL:-604800}
      # Coolify injects the public URL — must match VITE_API_URL baked in the frontend image
      FRONTEND_URL:             ${SERVICE_FQDN_BACKEND_4000}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: vianmora/web-widget-tool-frontend:latest
    # No `ports` here — Coolify handles ingress and TLS termination.
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
