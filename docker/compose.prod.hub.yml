# =============================================================================
# Production — images pré-buildées depuis Docker Hub
#
# Utilise les images publiées par le workflow CI (docker-publish.yml).
# Aucun build local requis.
#
# Usage:
#   cp .env.example .env.prod   # fill in all required variables
#   docker compose -f docker/compose.prod.hub.yml --env-file .env.prod up -d
#
# Note: VITE_API_URL est baked dans l'image frontend au moment du build CI.
# Elle doit correspondre à l'URL publique de votre backend.
#
# The app is reachable on http://host:${PORT:-3000}
# Put a reverse proxy (Nginx, Caddy, Traefik…) in front for HTTPS.
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB:       widgets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ${DOCKERHUB_USERNAME:?DOCKERHUB_USERNAME is required}/web-widget-tool-backend:latest
    ports:
      - "${PORT:-4000}:4000"
    environment:
      DATABASE_URL:               postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/widgets
      ADMIN_EMAIL:                ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD:             ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      JWT_SECRET:                 ${JWT_SECRET:?JWT_SECRET is required}
      GOOGLE_MAPS_API_KEY:        ${GOOGLE_MAPS_API_KEY}
      GOOGLE_REVIEWS_CACHE_TTL:   ${GOOGLE_REVIEWS_CACHE_TTL:-604800}
      FRONTEND_URL:               ${APP_URL:?APP_URL is required}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: ${DOCKERHUB_USERNAME}/web-widget-tool-frontend:latest
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
