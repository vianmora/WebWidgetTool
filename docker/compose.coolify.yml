# =============================================================================
# Coolify deployment — image pré-buildée depuis Docker Hub
#
# Utilise l'image publiée par le workflow CI (docker-publish.yml).
# Aucun build local requis.
#
# Variables obligatoires à renseigner dans l'UI Coolify :
#   - POSTGRES_USER
#   - ADMIN_EMAIL
#   - GOOGLE_MAPS_API_KEY
# Les passwords sont auto-générés par Coolify (SERVICE_PASSWORD_*).
# =============================================================================

services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      POSTGRES_USER: '${POSTGRES_USER:?postgres}'
      POSTGRES_PASSWORD: '${SERVICE_PASSWORD_POSTGRES}'
      POSTGRES_DB: widgets
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U ${POSTGRES_USER}'
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  app:
    image: 'vianmora/web-widget-tool:latest'
    expose:
      - '4000'
    environment:
      SERVICE_FQDN_APP_4000: ''
      DATABASE_URL: 'postgresql://${POSTGRES_USER}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/widgets'
      ADMIN_EMAIL: '${ADMIN_EMAIL:?}'
      ADMIN_PASSWORD: '${SERVICE_PASSWORD_ADMIN}'
      JWT_SECRET: '${SERVICE_PASSWORD_64_JWT}'
      GOOGLE_MAPS_API_KEY: '${GOOGLE_MAPS_API_KEY}'
      GOOGLE_REVIEWS_CACHE_TTL: '${GOOGLE_REVIEWS_CACHE_TTL:-604800}'
      FRONTEND_URL: '${SERVICE_URL_APP_4000}'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - wget
        - '-q'
        - '--spider'
        - 'http://localhost:4000/health'
      interval: 30s
      timeout: 10s
      retries: 3
volumes:
  postgres_data: null
